# ============================================================
# setup-vms.yml
# Distrobox and VMM on both machines.
# Windows VM on laptop, gaming emulators on PC.
# ============================================================

- name: Setup VMs
  hosts: "{{ machine_type }}"
  become: true
  vars_files:
    - vault.yml
  roles:
    # - 5_distrobox
    # - 6_vmm
    - 7_ubuntu-packages
    # - 8_vm-setup

- name: Configure git user name
  community.general.git_config:
    name: user.name
    value: "{{ vault_github_user }}"
    scope: global
  become: true
  become_user: "{{ main_user }}"  