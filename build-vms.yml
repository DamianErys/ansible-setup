# ============================================================
# setup-vms.yml
# Distrobox and VMM on both machines.
# Windows VM on laptop, gaming emulators on PC.
# ============================================================

- name: Setup VMs
  hosts: "{{ machine_type }}"
  become: true
  vars_files:
    - vault.yml
  roles:
    - distrobox
    - vmm

- name: Windows VM (laptop only)
  hosts: laptop
  become: true
  vars_files:
    - vault.yml
  roles:
    - vm-windows

- name: Gaming VMs (PC only)
  hosts: pc
  become: true
  vars_files:
    - vault.yml
  roles:
    - vm-gaming