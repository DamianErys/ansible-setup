# ============================================================
# inventory.ini
# ============================================================
# All playbooks run locally (connection: local).
# machine_type is passed in by RunAnsible.sh (laptop | pc)
# and controls which host group is active.
# ============================================================
[laptop]
localhost ansible_connection=local main_user=erys_laptop

[pc]
localhost ansible_connection=local main_user=erys_pc

[all:vars]
ansible_user=root
