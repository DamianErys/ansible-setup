# ============================================================
# inventory.ini
# ============================================================
[laptop]
laptop_host ansible_connection=local ansible_host=localhost main_user=erys_laptop

[pc]
pc_host ansible_connection=local ansible_host=localhost main_user=erys_pc

[workstation]
pc_host ansible_connection=local ansible_host=localhost main_user=erys_workstation

[generic]
# Change main_user to the actual target username before running generic.yml
generic_host ansible_connection=local ansible_host=localhost main_user=generic_user

[all:vars]
ansible_user=root
main_user_uid=1000