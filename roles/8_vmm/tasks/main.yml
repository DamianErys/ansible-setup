---
# tasks file for roles/vmm
# ============================================================
# roles/vmm/tasks/main.yml
# Installs virt-manager and libvirt stack on both machines
# libvirtd enabled and user added to libvirt group
# ============================================================

- name: Install virt-manager and KVM stack
  ansible.builtin.dnf:
    name:
      - virt-manager
      - libvirt
      - qemu-kvm
      - virt-install
    state: present

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Add user to libvirt group
  ansible.builtin.user:
    name: "{{ main_user }}"
    groups: libvirt
    append: true