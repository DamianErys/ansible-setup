---
# roles/17_custom-commands/tasks/main.yml

- name: Create ~/.local/bin directory
  ansible.builtin.file:
    path: "/home/{{ main_user }}/.local/bin"
    state: directory
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"

- name: Ensure ~/.local/bin is in PATH via .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ main_user }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    insertbefore: '^# Source global bashrc'

# -----------------------------------------------
# GoToUbuntu
# -----------------------------------------------
- name: Create GoToUbuntu command
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/GoToUbuntu"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      distrobox enter ubuntu-box

# -----------------------------------------------
# Windows boot
# -----------------------------------------------
- name: Create windows-boot command for PC
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/windows-boot"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash

      if grub2-reboot "Windows Boot Manager (on /dev/nvme0n1p1)" 2>/dev/null; then
          sudo reboot
      elif sudo efibootmgr -n 0000 2>/dev/null; then
          sudo reboot
      else
          echo "Could not find Windows boot entry"
          sudo efibootmgr
          exit 1
      fi
  when: machine_type == 'pc'

- name: Create reboot-windows alias
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/reboot-windows"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      exec ~/.local/bin/windows-boot
  when: machine_type == 'pc'

# -----------------------------------------------
# Serial tool
# -----------------------------------------------
- name: Install picocom
  ansible.builtin.dnf:
    name: picocom
    state: present

- name: Create serial command
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/serial"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      CONFIG_FILE="$HOME/.serial_config"

      load_defaults() {
          SERIAL_PORT="/dev/ttyUSB0"
          BAUD="115200"
          DATABITS="8"
          PARITY="none"
          STOPBITS="1"
      }

      list_ports() {
          echo "Available serial ports:"
          ls /dev/ttyUSB* /dev/ttyACM* /dev/ttyS* 2>/dev/null || echo "None found"
      }

      show_config() {
          if [[ -f "$CONFIG_FILE" ]]; then
              source "$CONFIG_FILE"
          else
              load_defaults
          fi

          echo "Port: $SERIAL_PORT"
          echo "Baud: $BAUD"
          echo "Data bits: $DATABITS"
          echo "Parity: $PARITY"
          echo "Stop bits: $STOPBITS"
      }

      save_config() {
          printf '%s\n' \
          "SERIAL_PORT=\"$SERIAL_PORT\"" \
          "BAUD=\"$BAUD\"" \
          "DATABITS=\"$DATABITS\"" \
          "PARITY=\"$PARITY\"" \
          "STOPBITS=\"$STOPBITS\"" \
          > "$CONFIG_FILE"
      }

      configure_serial() {
          load_defaults
          [[ -f "$CONFIG_FILE" ]] && source "$CONFIG_FILE"

          list_ports
          echo ""

          read -r -p "Port [$SERIAL_PORT]: " input
          SERIAL_PORT="${input:-$SERIAL_PORT}"

          read -r -p "Baud [$BAUD]: " input
          BAUD="${input:-$BAUD}"

          read -r -p "Data bits [$DATABITS]: " input
          DATABITS="${input:-$DATABITS}"

          read -r -p "Parity [$PARITY]: " input
          PARITY="${input:-$PARITY}"

          read -r -p "Stop bits [$STOPBITS]: " input
          STOPBITS="${input:-$STOPBITS}"

          save_config
          echo "Saved."
      }

      connect_serial() {
          [[ -f "$CONFIG_FILE" ]] && source "$CONFIG_FILE" || load_defaults

          if [[ ! -e "$SERIAL_PORT" ]]; then
              echo "Port not found"
              list_ports
              exit 1
          fi

          case "$PARITY" in
              even) P="e" ;;
              odd)  P="o" ;;
              *)    P="n" ;;
          esac

          picocom -b "$BAUD" --databits "$DATABITS" --parity "$P" --stopbits "$STOPBITS" "$SERIAL_PORT"
      }

      menu() {
          echo "1) Ports"
          echo "2) Config"
          echo "3) Setup"
          echo "4) Connect"
          echo "5) Exit"

          read -r -p "> " opt

          case "$opt" in
              1) list_ports ;;
              2) show_config ;;
              3) configure_serial ;;
              4) connect_serial ;;
              5) exit 0 ;;
          esac

          menu
      }

      if [[ $# -eq 0 ]]; then
          menu
      else
          SERIAL_PORT="$1"
          BAUD="${2:-115200}"
          DATABITS="8"
          PARITY="none"
          STOPBITS="1"
          connect_serial
      fi

# -----------------------------------------------
# Update system
# -----------------------------------------------
- name: Create update-system command
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/update-system"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      sudo dnf update -y
      distrobox enter ubuntu-box -- sudo apt update && sudo apt upgrade -y

# -----------------------------------------------
# Find file
# -----------------------------------------------
- name: Create find-file command
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/find-file"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      [[ -z "$1" ]] && echo "Usage: find-file <pattern>" && exit 1
      find ~ -type f -iname "*$1*" 2>/dev/null | head -20

# -----------------------------------------------
# mkcd
# -----------------------------------------------
- name: Add mkcd function
  ansible.builtin.blockinfile:
    path: "/home/{{ main_user }}/.bashrc"
    block: |
      mkcd() {
          mkdir -p "$1" && cd "$1"
      }

# -----------------------------------------------
# Ports
# -----------------------------------------------
- name: Create ports command
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.local/bin/ports"
    mode: '0755'
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    content: |
      #!/usr/bin/env bash
      sudo ss -tulpn | grep LISTEN