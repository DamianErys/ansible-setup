---
# tasks file for roles/vm-gaming
# ============================================================
# roles/vm-gaming/tasks/main.yml
# Installs RPCS3 and PCSX2 via Flatpak — PC only
# BIOS files expected in ~/ansible-setup/isos/
# ============================================================

- name: Install RPCS3 and PCSX2 via Flatpak
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - net.rpcs3.RPCS3
    - net.pcsx2.PCSX2

# -----------------------------------------------
# BIOS — PS3 (RPCS3)
# Expected filename: ps3_bios.zip
# -----------------------------------------------
- name: Check PS3 BIOS exists in isos folder
  ansible.builtin.stat:
    path: "{{ home_dir }}/ansible-setup/isos/ps3_bios.zip"
  register: ps3_bios_stat

- name: Create RPCS3 BIOS directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/rpcs3/dev_flash"
    state: directory
    mode: '0755'
  when: ps3_bios_stat.stat.exists

- name: Extract PS3 BIOS into RPCS3 config dir
  ansible.builtin.unarchive:
    src: "{{ home_dir }}/ansible-setup/isos/ps3_bios.zip"
    dest: "{{ home_dir }}/.config/rpcs3/dev_flash"
    remote_src: true
  when: ps3_bios_stat.stat.exists

- name: Warn if PS3 BIOS missing
  ansible.builtin.debug:
    msg: "ps3_bios.zip not found in isos/ — add it to the USB and rerun to install"
  when: not ps3_bios_stat.stat.exists

# -----------------------------------------------
# BIOS — PS2 (PCSX2)
# Expected filename: ps2_bios.zip
# -----------------------------------------------
- name: Check PS2 BIOS exists in isos folder
  ansible.builtin.stat:
    path: "{{ home_dir }}/ansible-setup/isos/ps2_bios.zip"
  register: ps2_bios_stat

- name: Create PCSX2 BIOS directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.config/PCSX2/bios"
    state: directory
    mode: '0755'
  when: ps2_bios_stat.stat.exists

- name: Extract PS2 BIOS into PCSX2 config dir
  ansible.builtin.unarchive:
    src: "{{ home_dir }}/ansible-setup/isos/ps2_bios.zip"
    dest: "{{ home_dir }}/.config/PCSX2/bios"
    remote_src: true
  when: ps2_bios_stat.stat.exists

- name: Warn if PS2 BIOS missing
  ansible.builtin.debug:
    msg: "ps2_bios.zip not found in isos/ — add it to the USB and rerun to install"
  when: not ps2_bios_stat.stat.exists