---
# tasks file for roles/asus-zenscreen
# ============================================================
# roles/asus-zenscreen/tasks/main.yml
# Runs install_displaylink.sh to install DisplayLink/ZenScreen
# RPM expected at: {{ playbook_dir }}/installers/DisplayLink.rpm
# ============================================================

- name: Check that DisplayLink RPM exists in installers folder
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/installers/DisplayLink.rpm"
  register: displaylink_rpm

- name: Fail early if RPM is missing
  ansible.builtin.fail:
    msg: >
      DisplayLink.rpm not found at {{ playbook_dir }}/installers/DisplayLink.rpm.
      Copy it from your USB drive and re-run.
  when: not displaylink_rpm.stat.exists

- name: Run DisplayLink install script
  ansible.builtin.script:
    cmd: "{{ role_path }}/files/install_displaylink.sh {{ playbook_dir }}/installers/DisplayLink.rpm"
  register: displaylink_result
  changed_when: "'already installed' not in displaylink_result.stdout"

- name: Show install script output
  ansible.builtin.debug:
    msg: "{{ displaylink_result.stdout_lines }}"