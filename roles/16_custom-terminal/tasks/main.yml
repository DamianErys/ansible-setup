---
# tasks file for roles/16_custom-terminal
# ============================================================
# roles/16_custom-terminal/tasks/main.yml
# Custom bash prompt + quality of life bash config
#
# Prompt logic:
#   Normal:   erys_pc /full/path $                (all dark red)
#   Git repo: erys_pc (dark red) /path (dark blue) (branch ✚✘ ↑↓) (purple)
#   Distrobox: erys_pc [ubuntu] /full/path $      (red prefix, same logic)
#
# QoL:
#   - Case-insensitive tab completion
#   - Single-tab scrollable menu
#   - Useful aliases
#   - Persistent history with timestamps
# ============================================================

# -----------------------------------------------
# Step 1 — Install FiraCode Nerd Font
# -----------------------------------------------
- name: Install fira-code-fonts base package
  ansible.builtin.dnf:
    name: fira-code-fonts
    state: present

- name: Create local fonts directory
  ansible.builtin.file:
    path: "/home/{{ main_user }}/.local/share/fonts"
    state: directory
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0755'

- name: Download FiraCode Nerd Font zip
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FiraCode.zip"
    dest: "/tmp/FiraCode.zip"
    mode: '0644'

- name: Unzip FiraCode Nerd Font into user fonts folder
  ansible.builtin.unarchive:
    src: "/tmp/FiraCode.zip"
    dest: "/home/{{ main_user }}/.local/share/fonts/"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    remote_src: true

- name: Rebuild font cache
  ansible.builtin.command: fc-cache -fv
  become: true
  become_user: "{{ main_user }}"
  changed_when: false

# -----------------------------------------------
# Step 2 — Set Ptyxis terminal font
# -----------------------------------------------
- name: Get Ptyxis default profile UUID
  ansible.builtin.shell: |
    gsettings get org.gnome.Ptyxis default-profile-uuid 2>/dev/null | tr -d "'"
  register: ptyxis_profile_uuid
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ main_user }}"

- name: Set Ptyxis font to FiraCode Nerd Font 12
  community.general.dconf:
    key: "/org/gnome/Ptyxis/Profiles/{{ ptyxis_profile_uuid.stdout | trim }}/font"
    value: "'FiraCode Nerd Font 12'"
  become: true
  become_user: "{{ main_user }}"
  when: ptyxis_profile_uuid.stdout | trim != ""

- name: Disable system font in Ptyxis to use custom font
  community.general.dconf:
    key: "/org/gnome/Ptyxis/Profiles/{{ ptyxis_profile_uuid.stdout | trim }}/use-system-font"
    value: "false"
  become: true
  become_user: "{{ main_user }}"
  when: ptyxis_profile_uuid.stdout | trim != ""

# -----------------------------------------------
# Step 3 — Deploy .bashrc
# -----------------------------------------------
- name: Deploy .bashrc for main user
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.bashrc"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0644'
    content: |
      # ============================================================
      # .bashrc
      # ============================================================

      # Source global bashrc if it exists
      [[ -f /etc/bashrc ]] && source /etc/bashrc

      # Don't run if not interactive
      [[ $- != *i* ]] && return

      # -----------------------------------------------
      # History
      # -----------------------------------------------
      HISTFILE=~/.bash_history
      HISTSIZE=10000
      HISTFILESIZE=10000
      HISTTIMEFORMAT="%Y-%m-%d %H:%M:%S  "
      HISTCONTROL=ignoredups:erasedups
      shopt -s histappend
      PROMPT_COMMAND="history -a; history -c; history -r; ${PROMPT_COMMAND:-}"

      # -----------------------------------------------
      # Shell options
      # -----------------------------------------------
      shopt -s autocd        # type a dir name to cd into it
      shopt -s cdspell       # fix minor typos in cd paths
      shopt -s dirspell      # fix minor typos in directory completion
      shopt -s checkwinsize  # update LINES/COLUMNS after each command

      # -----------------------------------------------
      # Aliases
      # -----------------------------------------------
      alias ll='ls -lah --color=auto'
      alias la='ls -A --color=auto'
      alias ls='ls --color=auto'
      alias ..='cd ..'
      alias ...='cd ../..'
      alias grep='grep --color=auto'
      alias gs='git status'
      alias ga='git add'
      alias gc='git commit'
      alias gp='git push'
      alias gl='git log --oneline --graph --decorate'

      # -----------------------------------------------
      # Colours
      # 256-colour codes picked for darker, richer tones
      #   dark red  = 124  (deep crimson)
      #   dark blue =  24  (steel blue)
      #   purple    =  91  (deep violet)
      # -----------------------------------------------
      _DARK_RED='\[\e[38;5;124m\]'
      _DARK_BLUE='\[\e[38;5;24m\]'
      _PURPLE='\[\e[38;5;91m\]'
      _RESET='\[\e[0m\]'

      # -----------------------------------------------
      # Distrobox detection - returns "@boxname" or "@HostDistro"
      # -----------------------------------------------
      _distrobox_label() {
        if [[ -f /run/.containerenv ]]; then
          local boxname
          boxname=$(grep -oP '(?<=^name=").*(?=")' /run/.containerenv 2>/dev/null)
          if [[ -n "$boxname" ]]; then
            # Clean up boxname - remove "-box" suffix if present
            boxname=${boxname%-box}
            echo "@${boxname}"
          fi
        else
          # Not in a container - detect host distro
          if [[ -f /etc/fedora-release ]]; then
            echo "@Fedora"
          elif [[ -f /etc/debian_version ]]; then
            echo "@Debian"
          elif [[ -f /etc/arch-release ]]; then
            echo "@Arch"
          elif command -v lsb_release &>/dev/null; then
            echo "@$(lsb_release -si)"
          else
            echo "@Host"
          fi
        fi
      }

      # -----------------------------------------------
      # Git prompt info
      # Returns plain text "(branch ✚ ✘ ↑2 ↓1)"
      # The whole string is wrapped in purple by _build_prompt
      # -----------------------------------------------
      _git_prompt() {
        local branch
        branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null)
        [[ -z "$branch" ]] && return

        local status_sym=''

        # Staged changes
        git diff --cached --quiet 2>/dev/null || status_sym+=' ✚'

        # Unstaged changes
        git diff --quiet 2>/dev/null || status_sym+=' ✘'

        # Ahead / behind remote
        local remote ahead=0 behind=0
        remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null)
        if [[ -n "$remote" ]]; then
          ahead=$(git rev-list --count @{u}..HEAD 2>/dev/null || echo 0)
          behind=$(git rev-list --count HEAD..@{u} 2>/dev/null || echo 0)
          [[ "$ahead"  -gt 0 ]] && status_sym+=" ↑${ahead}"
          [[ "$behind" -gt 0 ]] && status_sym+=" ↓${behind}"
        fi

        echo "(${branch}${status_sym})"
      }

      # -----------------------------------------------
      # Prompt builder — called before every prompt
      #
      # In Git repo:
      #   erys_pc @ubuntu ~/path (main ✚ ✘ ↑1) $ 
      #
      # Not in Git:
      #   erys_pc @ubuntu ~/path $ 
      # -----------------------------------------------
      _build_prompt() {
        local box_label git_info
        box_label=$(_distrobox_label)
        git_info=$(_git_prompt)

        if [[ -n "$git_info" ]]; then
          PS1="${_DARK_RED}{{ main_user }}${box_label} ${_DARK_BLUE}\w ${_PURPLE}${git_info}${_RESET} \$ "
        else
          PS1="${_DARK_RED}{{ main_user }}${box_label} \w${_RESET} \$ "
        fi
      }

      PROMPT_COMMAND="_build_prompt; ${PROMPT_COMMAND:-}"

# -----------------------------------------------
# Step 4 — Deploy .inputrc (tab completion QoL)
# -----------------------------------------------
- name: Deploy .inputrc for main user
  ansible.builtin.copy:
    dest: "/home/{{ main_user }}/.inputrc"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0644'
    content: |
      # ============================================================
      # .inputrc — readline config (affects bash tab completion)
      # ============================================================

      # Case-insensitive completion
      set completion-ignore-case on

      # Treat - and _ as equivalent in completion
      set completion-map-case on

      # Show all matches on first tab press
      set show-all-if-ambiguous on

      # Cycle through completions with TAB, reverse with Shift+TAB
      set menu-complete-display-prefix on
      TAB: menu-complete
      "\e[Z": menu-complete-backward

      # Show file type indicators (/ for dirs, * for executables)
      set visible-stats on

      # Colour completions by file type
      set colored-stats on

      # Highlight common prefix
      set colored-completion-prefix on

      # No bell
      set bell-style none