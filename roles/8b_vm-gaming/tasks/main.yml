---
# tasks file for roles/vm-gaming
# ============================================================
# roles/vm-gaming/tasks/main.yml
# Installs RPCS3 and PCSX2 via Flatpak — PC only
# BIOS files expected in ~/ansible-setup/isos/
# ============================================================

- name: Install RPCS3 and PCSX2 via Flatpak
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - net.rpcs3.RPCS3
    - net.pcsx2.PCSX2
