---
# roles/18_app-organise/tasks/main.yml

# ============================================================
# Step 1: Define folders
# ============================================================
- name: Define GNOME app folders
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folder-names"
    value: "['Proton', 'KiCad', 'VMs', 'Games', 'Media', 'Interfaces', 'Accessories', 'Documentation']"

# ============================================================
# Proton
# ============================================================
- name: Proton folder name
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Proton/name"
    value: "'Proton'"

- name: Proton folder apps
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Proton/apps"
    value: "['me.proton.Mail.desktop', 'me.proton.Pass.desktop', 'com.protonvpn.www.desktop']"

- name: Proton folder categories
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Proton/categories"
    value: "@as []"

