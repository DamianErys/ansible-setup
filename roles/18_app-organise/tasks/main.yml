---
# roles/18_app-organise/tasks/main.yml

# ============================================================
# Step 1: Register all folders with GNOME
# CORRECT key: /org/gnome/desktop/app-folders/folder-children
# ============================================================
- name: Register all folders with GNOME
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/desktop/app-folders/folder-children"
    value: "['Proton', 'KiCad', 'VMs', 'Games', 'Media', 'Interfaces', 'Accessories', 'Documentation']"

# ============================================================
# Proton
# ============================================================
- name: Proton folder name
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/desktop/app-folders/folders/Proton/name"
    value: "'Proton'"

- name: Proton folder apps
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/desktop/app-folders/folders/Proton/apps"
    value: "['me.proton.Mail.desktop', 'me.proton.Pass.desktop', 'com.protonvpn.www.desktop']"

# ============================================================
# KiCad — all 6 desktop entries from the Flatpak
# ============================================================
- name: KiCad folder name
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/desktop/app-folders/folders/KiCad/name"
    value: "'KiCad'"

- name: KiCad folder apps
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/desktop/app-folders/folders/KiCad/apps"
    value: "['org.kicad.KiCad.desktop', 'org.kicad.KiCad.eeschema.desktop', 'org.kicad.KiCad.gerbview.desktop', 'org.kicad.KiCad.pcbcalculator.desktop', 'org.kicad.KiCad.pcbnew.desktop', 'org.kicad.KiCad.bitmap2component.desktop']"

