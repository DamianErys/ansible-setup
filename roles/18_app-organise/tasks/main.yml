# ============================================================
# Hide clutter
# ============================================================
- name: Hide unwanted apps
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-picker-view/entries-to-hide"
    value: "['org.gnome.Calendar.desktop', 'org.gnome.TextEditor.desktop', 'org.gnome.Calculator.desktop', 'org.gnome.SystemMonitor.desktop', 'org.gnome.Logs.desktop', 'org.gnome.baobab.desktop']"

# ============================================================
# Favourites (FIXED terminal)
# ============================================================
- name: Set favourites
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "['org.mozilla.firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Ptyxis.desktop', 'virt-manager.desktop']"

# ============================================================
# Reload GNOME Shell (safe)
# ============================================================
- name: Reload GNOME Shell
  become: true
  become_user: "{{ main_user }}"
  ansible.builtin.command:
    cmd: busctl --user call org.gnome.Shell /org/gnome/Shell org.gnome.Shell Eval s 'global.reexec_self()'
  ignore_errors: true
  changed_when: false