        'apps': [
          'ubuntu-box.desktop',
          'net.pcsx2.PCSX2.desktop',
          'net.rpcs3.RPCS3.desktop'
        ],
        'categories': [],
        'translations': {}
      }

# -----------------------------------------------
# Step 5: Games folder
# -----------------------------------------------
- name: Create Games folder structure
  become: true
