---
# roles/18_app-organise/tasks/main.yml
# Organize GNOME app grid into folders and set pinned dash items
# ============================================================

# -----------------------------------------------
# Step 1: Create folder definitions
# -----------------------------------------------
- name: Create app folders via dconf
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folder-names"
    value: "['Proton', 'KiCad', 'VMs', 'Games', 'Media', 'Interfaces', 'Accessories', 'Documentation']"

# -----------------------------------------------
# Step 2: Proton folder
# -----------------------------------------------
- name: Create Proton folder structure
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Proton"
    value: |
      {
        'name': 'Proton',
        'apps': [
          'me.proton.Mail.desktop',
          'me.proton.Pass.desktop',
          'com.protonvpn.www.desktop'
        ],
        'categories': [],
        'translations': {}
      }

# -----------------------------------------------
# Step 3: KiCad folder (all KiCad apps)
# -----------------------------------------------
- name: Create KiCad folder structure
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/KiCad"
    value: |
      {
        'name': 'KiCad',
        'apps': [
          'org.kicad.KiCad.desktop',
          'org.kicad.KiCadGerberViewer.desktop',
          'org.kicad.KiCadImageConverter.desktop',
          'org.kicad.KiCadCalculator.desktop',
          'org.kicad.KiCadPcbEditor.desktop',
          'org.kicad.KiCadSchematicEditor.desktop'
        ],
        'categories': [],
        'translations': {}
      }

# -----------------------------------------------
# Step 4: VMs folder
# -----------------------------------------------
- name: Create VMs folder structure
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
