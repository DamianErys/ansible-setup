# ============================================================
# Favourites (dash/taskbar)
# ============================================================
- name: Set favourites
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "['org.mozilla.firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Ptyxis.desktop', 'virt-manager.desktop', 'com.spotify.Client.desktop', 'com.visualstudio.code.desktop', 'com.discordapp.Discord.desktop', 'com.rtosta.zapzap.desktop']"

# ============================================================
# Clean up the old wrong-path keys left by previous runs
# ============================================================
- name: Remove stale folder-names key from wrong path
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folder-names"
    state: absent

- name: Remove stale folders key from wrong path
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders"
    state: absent