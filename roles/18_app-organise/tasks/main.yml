# ============================================================
# Favourites (dash/taskbar)
# virt-manager removed, code (native) added
# ============================================================
- name: Set favourites
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "['org.mozilla.firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Ptyxis.desktop', 'code.desktop', 'com.spotify.Client.desktop', 'com.discordapp.Discord.desktop', 'com.rtosta.zapzap.desktop']"

# ============================================================
# Clean up stale keys from previous runs
# ============================================================
- name: Remove stale folder-names key from wrong path
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folder-names"
    state: absent

- name: Remove stale folders key from wrong path
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders"
    state: absent