      }

# -----------------------------------------------
# Step 8: Accessories folder
# -----------------------------------------------
- name: Create Accessories folder structure
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Accessories"
    value: |
      {
        'name': 'Accessories',
        'apps': [
          'org.gnome.Contacts.desktop',
          'org.gnome.Weather.desktop',
          'org.gnome.clocks.desktop',
          'org.gnome.Maps.desktop',
          'org.gnome.Camera.desktop',
          'gnome-system-monitor.desktop',
          'org.gnome.Logs.desktop'
        ],
        'categories': [],
        'translations': {}
      }

# -----------------------------------------------
# Step 9: Documentation folder
# -----------------------------------------------
- name: Create Documentation folder structure
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folders/Documentation"
    value: |
      {
        'name': 'Documentation',
        'apps': [
          'org.texstudio.TeXstudio.desktop',
          'reqview.desktop',
          'org.inkscape.Inkscape.desktop'
        ],
        'categories': [],
        'translations': {}
      }

# -----------------------------------------------
# Step 10: Hide clutter from main app grid
# -----------------------------------------------
- name: Hide system settings duplicates and unwanted apps
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-picker-view/entries-to-hide"
    value: |
      [
        'org.gnome.Calendar.desktop',
        'org.gnome.TextEditor.desktop',
        'org.gnome.Calculator.desktop',
        'gnome-system-monitor.desktop',
        'org.gnome.Logs.desktop',
        'org.gnome.baobab.desktop'
      ]

# -----------------------------------------------
# Step 11: Set pinned/favorite apps on dash
# -----------------------------------------------
- name: Set favorite apps on dash
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: |
      [
        'org.mozilla.firefox.desktop',
        'com.spotify.Client.desktop',
        'com.rtosta.zapzap.desktop',
        'com.discordapp.Discord.desktop',
        'virt-manager.desktop',
        'com.visualstudio.code.desktop',
        'org.gnome.Nautilus.desktop',
        'org.gnome.Terminal.desktop'
      ]

# -----------------------------------------------
# Step 12: Clean up desktop entry cache
# -----------------------------------------------
- name: Refresh GNOME Shell app cache
  become: true
  become_user: "{{ main_user }}"
  ansible.builtin.command: 
    cmd: killall -3 gnome-shell
  changed_when: false
  ignore_errors: true

# -----------------------------------------------
# Step 13: Remove any existing folder entries that might conflict
# -----------------------------------------------
- name: Ensure no old folder conflicts
  become: true
  become_user: "{{ main_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/app-folder/folder-names"
    value: "['Proton', 'KiCad', 'VMs', 'Games', 'Media', 'Interfaces', 'Accessories', 'Documentation']"