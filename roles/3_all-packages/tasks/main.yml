---
# tasks file for roles/flatpak-packages
# ============================================================
# roles/flatpak-packages/tasks/main.yml
# Install Flatpak, add Flathub, and install apps by machine type
#
# Machine behaviour:
#   laptop      — shared apps + VS Code (Microsoft repo) + TexLive full
#   workstation — shared apps + VS Code (Microsoft repo) + TexLive full
#   pc          — shared apps (Flatpak VS Code) + Steam + Heroic + GameConqueror
# ============================================================

# -----------------------------------------------
# Flatpak setup
# -----------------------------------------------
- name: Install flatpak
  ansible.builtin.dnf:
    name: flatpak
    state: present

- name: Add Flathub remote
  ansible.builtin.command: >
    flatpak remote-add --if-not-exists flathub
    https://dl.flathub.org/repo/flathub.flatpakrepo
  changed_when: false

# -----------------------------------------------
# Apps — all machines
# -----------------------------------------------
- name: Install shared Flatpak apps
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - com.spotify.Client
    - com.anydesk.Anydesk
    - com.protonvpn.www
    - me.proton.Mail
    - me.proton.Pass
    - org.videolan.VLC
    - org.inkscape.Inkscape
    - com.rtosta.zapzap
    - com.discordapp.Discord
    - org.kicad.KiCad
    - org.raspberrypi.rpi-imager
    - com.github.flxzt.rnote
    - com.mattjakeman.ExtensionManager
    - org.gnome.Evolution
    - org.qbittorrent.qBittorrent

- name: Install PulseView via DNF
  ansible.builtin.dnf:
    name: pulseview
    state: present

- name: Extract XPPen driver
  ansible.builtin.unarchive:
    src: "{{ playbook_dir }}/installers/XPPen.tar.gz"
    dest: /opt/
    remote_src: false
  become: true

- name: Create desktop entry for XPPen
  ansible.builtin.copy:
    dest: /usr/share/applications/xppen.desktop
    content: |
      [Desktop Entry]
      Name=XP-Pen Tablet
      Exec=/opt/pentablet/pentablet
      Icon=/opt/pentablet/pentablet.png
      Type=Application
      Categories=Settings;
    mode: '0644'
  become: true

- name: Install VS Code from Microsoft repo (laptop + workstation)
  ansible.builtin.dnf:
    name: code
    state: present

# -----------------------------------------------
# Apps — laptop + workstation
# Required for LaTeX extension support
# -----------------------------------------------

- name: Install TexLive full scheme for LaTeX in VS Code (laptop + workstation)
  ansible.builtin.dnf:
    name: texlive-scheme-full
    state: present
  when: machine_type in ['laptop', 'workstation']

# -----------------------------------------------
# Apps — PC only
# -----------------------------------------------
- name: Install PC Flatpak apps
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - com.valvesoftware.Steam
    - com.heroicgameslauncher.hgl
  when: machine_type == 'pc'

- name: Install PC DNF apps
  ansible.builtin.dnf:
    name:
      - gameconqueror
    state: present
  when: machine_type == 'pc'