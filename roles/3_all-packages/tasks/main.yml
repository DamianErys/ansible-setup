---
# tasks file for roles/flatpak-packages
# ============================================================
# roles/flatpak-packages/tasks/main.yml
# Install Flatpak, add Flathub, and install apps by machine type
# ============================================================

# -----------------------------------------------
# Flatpak setup
# -----------------------------------------------
- name: Install flatpak
  ansible.builtin.dnf:
    name: flatpak
    state: present

- name: Add Flathub remote
  ansible.builtin.command: >
    flatpak remote-add --if-not-exists flathub
    https://dl.flathub.org/repo/flathub.flatpakrepo

# -----------------------------------------------
# Apps — both machines
# -----------------------------------------------
- name: Install shared Flatpak apps
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - com.visualstudio.code
    - com.spotify.Client
    - org.texstudio.TeXstudio
    - com.anydesk.Anydesk
    - com.protonvpn.www
    - me.proton.Mail
    - me.proton.Pass
    - org.videolan.VLC
    - org.inkscape.Inkscape
    - com.rtosta.zapzap
    - com.discordapp.Discord
    - org.kicad.KiCad
    - org.raspberrypi.rpi-imager
    - io.github.zarestia_dev.rclone-manage
    - com.github.flxzt.rnote 

- name: Install PulseView via DNF
  ansible.builtin.dnf:
    name: pulseview
    state: present

- name: Extract XPPen Driver
  ansible.builtin.unarchive:
    src: "{{ playbook_dir }}/installers/XPPen.tar.gz"
    dest: /opt/
    remote_src: false
  become: true

- name: Create Desktop Entry for XPPen
  ansible.builtin.copy:
    dest: /usr/share/applications/xppen.desktop
    content: |
      [Desktop Entry]
      Name=XP-Pen Tablet
      Exec=/opt/pentablet/pentablet
      Icon=/opt/pentablet/pentablet.png
      Type=Application
      Categories=Settings;
    mode: '0644'
  become: true

