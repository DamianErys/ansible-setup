# -----------------------------------------------
# Apps — PC only
# -----------------------------------------------
- name: Install PC Flatpak apps
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    remote: flathub
  loop:
    - com.valvesoftware.Steam
    - com.heroicgameslauncher.hgl
  when: machine_type == 'pc'

- name: Install PC DNF apps
  ansible.builtin.dnf:
    name:
      - gameconqueror
    state: present
  when: machine_type == 'pc'