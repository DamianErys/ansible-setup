---
# tasks file for 19_proton-drive
- name: Check if rclone is installed
  ansible.builtin.command: rclone --version
  register: rclone_check
  changed_when: false

- name: Generate obscured password for Proton Drive
  ansible.builtin.shell: "rclone obscure {{ proton_pass }}"
  register: obscured_pass_output
  no_log: true  # Prevents the password from appearing in Ansible logs
  changed_when: false

- name: Set obscured password fact
  ansible.builtin.set_fact:
    proton_pass_obscured: "{{ obscured_pass_output.stdout }}"
  no_log: true

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: "~/.config/rclone"
    state: directory
    mode: '0700'
  become: false # Run as your user, not root

- name: Deploy rclone configuration
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "~/.config/rclone/rclone.conf"
    mode: '0600'
  become: false