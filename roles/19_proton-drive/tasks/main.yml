---
- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: "{{ rclone_config_dir }}"
    state: directory
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0700'

- name: Ensure rclone state directory exists
  ansible.builtin.file:
    path: "{{ rclone_state_dir }}"
    state: directory
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0755'

- name: Obscure Proton password for rclone
  ansible.builtin.command:
    cmd: "rclone obscure {{ proton_pass }}"
  register: rclone_obscured_pass
  changed_when: false
  no_log: true

- name: Write rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ rclone_config_file }}"
    owner: "{{ main_user }}"
    group: "{{ main_user }}"
    mode: '0600'
  vars:
    proton_pass_obscured: "{{ rclone_obscured_pass.stdout }}"
  no_log: true

- name: Install bisync systemd service
  ansible.builtin.template:
    src: rclone-bisync.service.j2
    dest: /etc/systemd/system/rclone-bisync-{{ main_user }}.service
    mode: '0644'

- name: Run initial bisync with --resync (first run only)
  ansible.builtin.command:
    cmd: >
      rclone bisync protondrive: /home/{{ main_user }}
      --resync
      --create-empty-src-dirs
      --log-file {{ rclone_state_dir }}/bisync-resync.log
      --log-level INFO
    creates: "{{ rclone_state_dir }}/.resync_done"
  become_user: "{{ main_user }}"
  register: resync_result

- name: Mark initial resync as complete
  ansible.builtin.file:
    path: "{{ rclone_state_dir }}/.resync_done"
    state: touch
    owner: "{{ main_user }}"
  when: resync_result.changed

- name: Enable and start bisync service
  ansible.builtin.systemd:
    name: "rclone-bisync-{{ main_user }}.service"
    enabled: true
    daemon_reload: true
    state: started