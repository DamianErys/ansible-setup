# tasks file for 19_proton-drive
# - name: Check if rclone is installed (via Flatpak)
#   ansible.builtin.command: 
#     cmd: "flatpak run --command=rclone io.github.zarestia_dev.rclone-manager --version"
#   register: rclone_check
#   changed_when: false

- name: Generate obscured password for Proton Drive
  ansible.builtin.shell: 
    cmd: "flatpak run --command=rclone io.github.zarestia_dev.rclone-manager obscure {{ proton_pass }}"
  register: obscured_pass_output
  no_log: true
  changed_when: false

- name: Set obscured password fact
  ansible.builtin.set_fact:
    proton_pass_obscured: "{{ obscured_pass_output.stdout }}"
  no_log: true

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/rclone"
    state: directory
    mode: '0700'
  become: false

- name: Deploy rclone configuration
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ ansible_env.HOME }}/.config/rclone/rclone.conf"
    mode: '0600'
  become: false