---
# tasks file for roles/update-system
# ============================================================
# roles/update-system/tasks/main.yml
# Full system update — DNF upgrade, kernel, drivers, firmware
# ============================================================

- name: Upgrade all packages to latest
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install kernel and core driver packages
  ansible.builtin.dnf:
    name:
      - kernel
      - kernel-devel
      - kernel-headers
      - kernel-modules-extra
      - akmods
      - dkms
    state: latest
    update_cache: true  # Add this - kernel might be newer than cache

- name: Update firmware (fwupd)
  ansible.builtin.dnf:
    name: fwupd
    state: latest

- name: Refresh firmware metadata
  ansible.builtin.command: fwupdmgr refresh --force
  changed_when: false

- name: Apply firmware updates
  ansible.builtin.command: fwupdmgr update -y
  register: fwupd_result
  changed_when: fwupd_result.rc == 0 and 'No updates' not in fwupd_result.stdout
  failed_when: fwupd_result.rc not in [0, 2]  # 2 = no updates available
  notify: reboot if firmware updated  # add handler