# ============================================================
# build-base.yml
# Brings the system to a clean, up-to-date baseline.
# ============================================================
- name: Build Base
  hosts: "{{ machine_type }}"
  become: true
  vars_files:
    - vault.yml
  roles:
    - update-system
    - flatpak-packages
    - remove-packages
    - asus-zenscreen