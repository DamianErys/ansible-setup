# ============================================================
# group_vars/all.yml
# Variables that apply to every machine (laptop and pc).
# Secrets are referenced here by name — values live in vault.yml
# ============================================================

github_user:  "{{ vault_github_user }}"
github_email: "{{ vault_github_email }}"
github_pat:   "{{ vault_github_pat }}"

ssh_password:            "{{ vault_ssh_password }}"
ansible_become_password: "{{ vault_ssh_password }}"